<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>April Squad</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1a2e; --surface: #252540; --surface2: #2a2a3e; --border: #3a3a4e;
  --text: #f0f0f0; --text2: #a0a0b8; --accent: #4ade80; --accent2: #f59e0b;
  --danger: #ef4444; --pot: #f59e0b; --chat-bg: #20203a;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 0; }
button { cursor: pointer; font-family: inherit; }
input, textarea, select { font-family: inherit; }

/* Top Bar */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
.topbar h1 { font-size: 1.15rem; font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-user { display: flex; align-items: center; gap: 6px; }
.topbar-user span { color: var(--accent); font-weight: 600; font-size: 0.85rem; }

/* Buttons */
.btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.97); }
.btn-accent { background: var(--accent); color: #000; }
.btn-orange { background: var(--accent2); color: #000; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; min-height: 36px; }
.btn-icon { background: none; border: none; color: var(--text2); font-size: 1rem; padding: 4px 6px; min-height: 44px; min-width: 44px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; }
.btn-icon:hover { background: var(--surface2); color: var(--text); }

/* Avatar */
.avatar { border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.avatar-placeholder { border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; color: #000; flex-shrink: 0; }

/* Pot Banner */
.pot-banner { text-align: center; padding: 16px 16px 10px; background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border-bottom: 1px solid var(--border); }
.pot-amount { font-size: 2.2rem; font-weight: 800; color: var(--pot); }
.pot-sub { color: var(--text2); font-size: 0.85rem; margin-top: 2px; }
.pot-actions { margin-top: 8px; }
.motivation-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 8px 20px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; cursor: pointer; min-height: 40px; transition: all 0.15s; }
.motivation-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Tab Bar */
.tab-bar { display: flex; background: var(--surface); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; }
.tab-bar button { flex: 1; padding: 10px 4px; border: none; background: none; color: var(--text2); font-size: 0.78rem; font-weight: 600; min-height: 44px; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.tab-bar button.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-bar button:hover:not(.active) { color: var(--text); }
.tab-icon { font-size: 1.1rem; }

/* Toast */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 20px; max-width: 340px; width: calc(100% - 32px); z-index: 500; text-align: center; font-size: 0.9rem; color: var(--text); cursor: pointer; animation: toastIn 0.3s ease, toastOut 0.3s ease 4s forwards; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; pointer-events: none; } }

/* Auth */
.auth-container { max-width: 340px; margin: 60px auto; padding: 24px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
.auth-toggle { display: flex; gap: 0; margin-bottom: 16px; }
.auth-toggle button { flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 0.85rem; font-weight: 600; min-height: 44px; }
.auth-toggle button:first-child { border-radius: 8px 0 0 8px; }
.auth-toggle button:last-child { border-radius: 0 8px 8px 0; }
.auth-toggle button.active { background: var(--accent); color: #000; border-color: var(--accent); }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 4px; }
.form-group .label-hint { font-size: 0.7rem; color: var(--accent2); margin-left: 4px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; min-height: 44px; }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
.auth-error { color: var(--danger); font-size: 0.8rem; margin-bottom: 8px; }

/* Tab Content */
.tab-content { display: none; }
.tab-content.active { display: block; }
.tab-panel { max-width: 600px; margin: 0 auto; padding: 16px; }

/* Daily Tracker */
.daily-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; }
.daily-header h2 { font-size: 1rem; font-weight: 600; text-align: center; min-width: 200px; }
.daily-nav { min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1.1rem; cursor: pointer; }
.daily-nav:hover { border-color: var(--accent); color: var(--accent); }
.daily-nav:disabled { opacity: 0.3; cursor: default; }

/* Collapsible form */
.collapsible { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.collapsible.open { max-height: 500px; }

/* Workout card */
.workout-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.wc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.wc-user { display: flex; align-items: center; gap: 8px; }
.wc-user-name { font-weight: 600; font-size: 0.9rem; }
.wc-badges { display: flex; gap: 4px; align-items: center; }
.badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
.badge-2x { background: var(--accent2); color: #000; }
.badge-duration { background: var(--surface2); color: var(--text2); }
.badge-cal { background: var(--surface2); color: var(--text2); }
.badge-comment { background: var(--surface2); color: var(--text2); cursor: pointer; }
.badge-comment:hover { color: var(--accent); }
.wc-actions { display: flex; gap: 2px; }
.wc-desc { font-size: 0.88rem; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
.wc-photo { width: 100%; border-radius: 8px; cursor: pointer; max-height: 220px; object-fit: cover; margin-bottom: 8px; }
.wc-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }

/* Skip card */
.skip-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.skip-card .skip-badge { padding: 3px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
.skip-badge-paid { background: var(--danger); color: #fff; }
.skip-badge-free { background: var(--accent2); color: #000; }
.skip-badge-erased { background: var(--surface2); color: var(--text2); text-decoration: line-through; }

/* Comments section */
.comments-area { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 8px; }
.comment-item { display: flex; gap: 6px; margin-bottom: 6px; align-items: flex-start; }
.comment-body { font-size: 0.82rem; line-height: 1.3; }
.comment-body strong { color: var(--accent); }
.comment-time { font-size: 0.7rem; color: var(--text2); }
.comment-form { display: flex; gap: 6px; margin-top: 6px; }
.comment-form input { flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; min-height: 44px; }
.comment-form button { min-height: 44px; padding: 0 14px; }

/* Reactions */
.reactions-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.reaction-chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; min-height: 28px; transition: all 0.15s; }
.reaction-chip.mine { border-color: var(--accent); background: rgba(74,222,128,0.1); }
.reaction-chip:hover { border-color: var(--accent); }
.reaction-add { font-size: 0.8rem; color: var(--text2); cursor: pointer; padding: 2px 6px; min-height: 28px; display: inline-flex; align-items: center; border-radius: 12px; }
.reaction-add:hover { background: var(--surface2); }
.emoji-picker { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; position: absolute; z-index: 10; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.emoji-picker button { background: none; border: none; font-size: 1.2rem; padding: 4px; min-width: 36px; min-height: 36px; border-radius: 6px; cursor: pointer; }
.emoji-picker button:hover { background: var(--surface2); }

/* Edit form inline */
.edit-form { margin-top: 8px; }
.edit-form .form-group { margin-bottom: 8px; }

/* Missing section */
.missing-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-top: 14px; }
.missing-section h4 { font-size: 0.8rem; color: var(--text2); margin-bottom: 8px; }
.missing-user { display: inline-flex; align-items: center; gap: 4px; margin: 3px 6px 3px 0; font-size: 0.82rem; color: var(--text2); }
.waiting { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

/* Calendar Tab */
.cal-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-controls select { padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; min-height: 44px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-header { text-align: center; font-size: 0.72rem; color: var(--text2); padding: 6px 2px; font-weight: 600; }
.cal-empty { background: transparent; }
.cal-day { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 4px; text-align: center; cursor: pointer; min-height: 60px; transition: all 0.15s; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 3px; }
.cal-day:hover { border-color: var(--accent); background: var(--surface2); }
.cal-day.today { border-color: var(--accent); border-width: 2px; }
.cal-day.future { opacity: 0.3; cursor: default; }
.cal-day.future:hover { border-color: var(--border); background: var(--surface); }
.cal-day .day-num { font-size: 0.88rem; font-weight: 700; color: var(--text); }
.cal-day .day-indicators { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; margin-top: 2px; }
.cal-day .dot { width: 6px; height: 6px; border-radius: 50%; }
.cal-day .day-icon { font-size: 0.75rem; }
.cal-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
.cal-legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; color: var(--text2); }

/* Scoreboard Tab */
.sb-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
.sb-card:nth-child(even) { background: var(--surface2); }
.sb-card.leader { border-color: var(--pot); background: linear-gradient(135deg, rgba(245,158,11,0.08), transparent); }
.sb-rank { font-size: 1.3rem; font-weight: 800; color: var(--text2); min-width: 32px; text-align: center; }
.sb-card.leader .sb-rank { color: var(--pot); }
.sb-info { flex: 1; min-width: 0; }
.sb-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.sb-name { font-weight: 700; font-size: 0.95rem; }
.sb-stats { display: flex; flex-wrap: wrap; gap: 6px; font-size: 0.73rem; color: var(--text2); }
.sb-stat { background: var(--bg); padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
.sb-stat.owed { color: var(--danger); font-weight: 600; }
.sb-stat.streak { color: var(--accent); }

/* Chat Tab */
.chat-container { display: flex; flex-direction: column; height: calc(100vh - 200px); max-width: 600px; margin: 0 auto; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.chat-msg { background: var(--surface); border-radius: 10px; padding: 10px 14px; }
.chat-msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.chat-msg-name { font-weight: 600; font-size: 0.85rem; }
.chat-msg-time { font-size: 0.7rem; color: var(--text2); }
.chat-msg-text { font-size: 0.88rem; line-height: 1.4; }
.chat-msg-source { font-size: 0.75rem; color: var(--accent2); margin-top: 4px; cursor: pointer; }
.chat-msg-source:hover { text-decoration: underline; }
.chat-input { display: flex; gap: 8px; padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); }
.chat-input input { flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; min-height: 44px; }
.chat-input button { min-height: 44px; }

/* Lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 300; justify-content: center; align-items: center; cursor: pointer; animation: fadeIn 0.2s ease; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 95%; max-height: 90vh; border-radius: 8px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Responsive */
@media (max-width: 420px) {
  .pot-amount { font-size: 1.8rem; }
  .tab-bar button { font-size: 0.7rem; }
  .tab-icon { font-size: 1rem; }
  .cal-day { min-height: 48px; padding: 4px 2px; }
  .cal-day .day-num { font-size: 0.78rem; }
  .daily-header h2 { font-size: 0.88rem; min-width: 170px; }
}
@media (max-width: 375px) {
  .cal-grid { gap: 2px; }
  .cal-day { min-height: 44px; }
  .cal-day .dot { width: 5px; height: 5px; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <h1>April Squad</h1>
  <div class="topbar-right" id="topbar-right"></div>
</div>

<!-- Pot Banner (always visible) -->
<div class="pot-banner">
  <div class="pot-amount" id="pot-amount">The Pot: $0</div>
  <div class="pot-sub" id="pot-sub">0 paid skips so far</div>
  <div class="pot-actions">
    <button class="motivation-btn" onclick="showMotivation()">I Need Motivation</button>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar" id="tab-bar" style="display:none">
  <button data-tab="daily" class="active" onclick="switchTab('daily')"><span class="tab-icon">&#128197;</span>Daily</button>
  <button data-tab="calendar" onclick="switchTab('calendar')"><span class="tab-icon">&#128467;</span>Calendar</button>
  <button data-tab="scoreboard" onclick="switchTab('scoreboard')"><span class="tab-icon">&#127942;</span>Board</button>
  <button data-tab="chat" onclick="switchTab('chat')"><span class="tab-icon">&#128172;</span>Chat</button>
</div>

<!-- Tab Content -->
<div id="tab-daily" class="tab-content active"></div>
<div id="tab-calendar" class="tab-content"></div>
<div id="tab-scoreboard" class="tab-content"></div>
<div id="tab-chat" class="tab-content"></div>

<!-- Auth (shown when not logged in) -->
<div id="auth-area"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="" alt="Photo">
</div>

<script>
// ── Supabase Config ──
const SB_URL = 'https://btwyyqqatlifcwtxihec.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0d3l5cXFhdGxpZmN3dHhpaGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjI3NzAsImV4cCI6MjA5MDYzODc3MH0.9FS6TISdli71t-RHSHXr9PRWUgNjKXzDEV1ssT4Seqs';
const HDR = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function sb(path, opts = {}) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: { ...HDR, ...(opts.headers || {}) }, ...opts });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || res.statusText); }
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

async function hashPin(pin) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── Session ──
function getSession() {
  const uid = localStorage.getItem('as_user_id');
  const uname = localStorage.getItem('as_username');
  const dn = localStorage.getItem('as_display_name');
  const av = localStorage.getItem('as_avatar_url');
  return uid && uname ? { user_id: uid, username: uname, display_name: dn || uname, avatar_url: av || null } : null;
}
function setSession(id, username, dn, av) {
  localStorage.setItem('as_user_id', id);
  localStorage.setItem('as_username', username);
  localStorage.setItem('as_display_name', dn || username);
  if (av) localStorage.setItem('as_avatar_url', av); else localStorage.removeItem('as_avatar_url');
}
function clearSession() { ['as_user_id','as_username','as_display_name','as_avatar_url'].forEach(k => localStorage.removeItem(k)); }

// ── Helpers ──
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayStr() { return fmtDate(new Date()); }
function getMonday(ds) {
  const d = new Date(ds + 'T00:00:00'); const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const m = new Date(d); m.setDate(diff); return fmtDate(m);
}
function relTime(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return 'now'; if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h'; return Math.floor(s/86400) + 'd';
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
const COLORS = ['#4ade80','#f59e0b','#60a5fa','#c084fc','#facc15','#22d3ee','#f87171','#34d399'];
let colorMap = {};
function userColor(uid) { if (!colorMap[uid]) { colorMap[uid] = COLORS[Object.keys(colorMap).length % COLORS.length]; } return colorMap[uid]; }
function avatarH(u, sz) {
  if (!u) return '';
  if (u.avatar_url) return `<img class="avatar" src="${u.avatar_url}" width="${sz}" height="${sz}" alt="">`;
  const i = (u.display_name || u.username || '?')[0].toUpperCase();
  return `<div class="avatar-placeholder" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*0.45)}px;background:${userColor(u.id)}">${i}</div>`;
}

// ── State ──
let allUsers=[], allWorkouts=[], allSkips=[], allMessages=[], allReactions=[];
let currentDay = todayStr();
let activeTab = 'daily';
const scrollPositions = {};
const REACTION_EMOJIS = ['\ud83d\udd25','\ud83d\udcaa','\ud83d\ude02','\ud83d\udc4f','\ud83d\udc80','\ud83d\ude24','\ud83e\udee1','\u2764\ufe0f'];

async function loadAllData() {
  const [users, workouts, skips, msgs, reacts] = await Promise.all([
    sb('users?select=id,username,display_name,avatar_url,created_at&order=created_at.asc'),
    sb('workouts?select=*&order=created_at.asc'),
    sb('skips?select=*&order=created_at.asc'),
    sb('chat_messages?select=*&order=created_at.asc'),
    sb('chat_reactions?select=*')
  ]);
  allUsers = users||[]; allWorkouts = workouts||[]; allSkips = skips||[];
  allMessages = msgs||[]; allReactions = reacts||[];
  colorMap = {}; allUsers.forEach(u => userColor(u.id));
}

// ── Pot ──
function calcPot() { const p = allSkips.filter(s => !s.is_free && !s.erased); return { total: p.length*20, count: p.length }; }
function updatePot() {
  const {total, count} = calcPot();
  document.getElementById('pot-amount').textContent = `The Pot: $${total}`;
  document.getElementById('pot-sub').textContent = `${count} paid skip${count!==1?'s':''} so far`;
}

// ── Motivation ──
const QUOTES = [
  "The only bad workout is the one that didn't happen.",
  "Sore today, strong tomorrow.",
  "I don't sweat, I sparkle.",

// ── Tabs ──
function switchTab(tab) {
  // Save scroll position
  scrollPositions[activeTab] = document.getElementById(`tab-${activeTab}`)?.scrollTop || window.scrollY;
  activeTab = tab;
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${tab}`));
  location.hash = tab;
  renderActiveTab();
  // Restore scroll
  requestAnimationFrame(() => {
    if (tab === 'chat') {
      const msgs = document.getElementById('chat-msg-list');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    } else {
      window.scrollTo(0, scrollPositions[tab] || 0);
    }
  });
}

function renderActiveTab() {
  if (activeTab === 'daily') renderDaily();
  else if (activeTab === 'calendar') renderCalendar();
  else if (activeTab === 'scoreboard') renderScoreboard();
  else if (activeTab === 'chat') renderChat();
}

async function doLogin() {
  const err = document.getElementById('auth-error');
  const u = document.getElementById('auth-user').value.trim().toLowerCase();
  const p = document.getElementById('auth-pin').value.trim();
  if (!u||p.length!==4) { err.textContent='Enter username and 4-digit PIN'; return; }
  try {
    const rows = await sb(`users?username=eq.${encodeURIComponent(u)}&select=id,username,display_name,avatar_url,pin_hash`);
    if (!rows||!rows.length) { err.textContent='User not found'; return; }
    const user = rows[0]; const h = await hashPin(p);
    if (h!==user.pin_hash) { err.textContent='Wrong PIN'; return; }
    setSession(user.id, user.username, user.display_name, user.avatar_url);
    await init();
  } catch(e) { err.textContent=e.message; }
}

async function doSignup() {
  const err = document.getElementById('auth-error');
  const dn = document.getElementById('auth-display').value.trim();
  const u = document.getElementById('auth-user').value.trim().toLowerCase();
  const p = document.getElementById('auth-pin').value.trim();
  const avIn = document.getElementById('auth-avatar');
  if (!dn) { err.textContent='Display Name is required'; return; }
  if (!u) { err.textContent='Username is required'; return; }
  if (p.length!==4||!/^\d{4}$/.test(p)) { err.textContent='PIN must be 4 digits'; return; }
  try {
    const h = await hashPin(p);
    const rows = await sb('users', { method:'POST', body: JSON.stringify({username:u,display_name:dn,pin_hash:h}) });
    const user = rows[0]; let avUrl = null;
    if (avIn.files.length>0) {
      const file = avIn.files[0]; const ext = file.name.split('.').pop()||'jpg';
      const path = `${user.id}/avatar.${ext}`;
      const up = await fetch(`${SB_URL}/storage/v1/object/avatars/${path}`, {
        method:'POST', headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true'}, body:file
      });
      if (up.ok) { avUrl = `${SB_URL}/storage/v1/object/public/avatars/${path}`; await sb(`users?id=eq.${user.id}`,{method:'PATCH',body:JSON.stringify({avatar_url:avUrl})}); }
    }
    setSession(user.id, user.username, user.display_name, avUrl);
    await init();
  } catch(e) {
    if (e.message.includes('duplicate')||e.message.includes('unique')) err.textContent='Username already taken';
    else err.textContent=e.message;
  }
}

function logout() { clearSession(); init(); }

// ── Daily Tracker Tab ──
function renderDaily() {
  const s = getSession(); if (!s) return;
  const el = document.getElementById('tab-daily');
  const d = new Date(currentDay + 'T00:00:00');
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const canPrev = currentDay > '2026-04-01';
  const canNext = currentDay < '2026-04-30';
  const isEditable = currentDay <= todayStr();

  const dayWorkouts = allWorkouts.filter(w => w.workout_date === currentDay);
  const daySkips = allSkips.filter(sk => sk.skip_date === currentDay);
  const myWorkouts = dayWorkouts.filter(w => w.user_id === s.user_id);
  const mySkip = daySkips.find(sk => sk.user_id === s.user_id);
  const hasRegular = myWorkouts.some(w => !w.is_two_a_day);
  const hasTwoADay = myWorkouts.some(w => w.is_two_a_day);
  const weekStart = getMonday(currentDay);
  const twoADaysThisWeek = allWorkouts.filter(w => w.user_id===s.user_id && w.is_two_a_day && getMonday(w.workout_date)===weekStart);
  const canTwoADay = hasRegular && !hasTwoADay && twoADaysThisWeek.length===0;
  const showLogBtn = isEditable && !hasRegular && !mySkip;
  const showTwoADayBtn = isEditable && canTwoADay && !mySkip;
  const showSkipBtn = isEditable && !hasRegular && !mySkip;

  let html = `<div class="tab-panel">`;
  // Date header
  html += `<div class="daily-header">
    <button class="daily-nav" onclick="navDay(-1)" ${canPrev?'':'disabled'}>&larr;</button>
    <h2>${dayNames[d.getDay()]}, ${monthNames[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}</h2>
    <button class="daily-nav" onclick="navDay(1)" ${canNext?'':'disabled'}>&rarr;</button>
  </div>`;

  // Action buttons
  if (showLogBtn) {
    html += `<button class="btn btn-accent" style="width:100%" onclick="toggleLogForm()">Log Workout</button>`;
    html += `<div class="collapsible" id="log-form-collapse"><div class="log-form" style="margin-top:8px">
      <div class="form-group"><label>What did you do? *</label><textarea id="wo-desc" placeholder="e.g., 5 mile run + core"></textarea></div>
      <div class="form-group"><label>Duration (minutes)</label><input type="number" id="wo-dur" placeholder="45" inputmode="numeric"></div>
      <div class="form-group"><label>Calories burned</label><input type="number" id="wo-cal" placeholder="320" inputmode="numeric"></div>
      <div class="form-group"><label>Photo proof <span class="label-hint">Recommended</span></label><input type="file" id="wo-photo" accept="image/*" capture="environment"></div>
      <button class="btn btn-accent" onclick="submitWorkout(false)">Submit Workout</button>
    </div></div>`;
    html += `<button class="btn btn-outline" style="width:100%;margin-top:8px" onclick="submitSkip()">Skip This Day</button>`;
  } else if (showTwoADayBtn) {
    html += `<button class="btn btn-orange" style="width:100%" onclick="toggleLogForm()">Log Two-a-Day</button>`;
    html += `<div class="collapsible" id="log-form-collapse"><div class="log-form" style="margin-top:8px">
      <div class="form-group"><label>Second workout *</label><textarea id="wo-desc" placeholder="e.g., Evening yoga"></textarea></div>
      <div class="form-group"><label>Duration (minutes)</label><input type="number" id="wo-dur" placeholder="30" inputmode="numeric"></div>
      <div class="form-group"><label>Calories burned</label><input type="number" id="wo-cal" placeholder="200" inputmode="numeric"></div>
      <div class="form-group"><label>Photo proof <span class="label-hint">Recommended</span></label><input type="file" id="wo-photo" accept="image/*" capture="environment"></div>
      <button class="btn btn-orange" onclick="submitWorkout(true)">Submit Two-a-Day</button>
    </div></div>`;
  }

  // Activity feed
  if (dayWorkouts.length === 0 && daySkips.length === 0) {
    html += `<p style="color:var(--text2);font-size:0.85rem;margin:16px 0">No entries yet for this day.</p>`;
  }

  dayWorkouts.forEach(w => { html += workoutCardHtml(w); });
  daySkips.forEach(sk => { html += skipCardHtml(sk); });

  // Missing
  const loggedIds = new Set([...dayWorkouts.map(w=>w.user_id), ...daySkips.filter(sk=>!sk.erased).map(sk=>sk.user_id)]);
  const missing = allUsers.filter(u => !loggedIds.has(u.id));
  if (missing.length > 0) {
    html += `<div class="missing-section"><h4>Still waiting on...</h4><div>`;
    missing.forEach(u => { html += `<span class="missing-user">${avatarH(u,20)} ${esc(u.display_name)} <span class="waiting">...</span></span>`; });
    html += `</div></div>`;
  }

  html += `</div>`;
  el.innerHTML = html;
}

  if (c) c.classList.toggle('open');

// ── Submit Workout ──
async function submitWorkout(isTwoADay) {
  const s = getSession(); if (!s) return;
  const desc = document.getElementById('wo-desc')?.value.trim();
  if (!desc) { alert('Workout description is required'); return; }
  const dur = parseInt(document.getElementById('wo-dur')?.value) || null;
  const cal = parseInt(document.getElementById('wo-cal')?.value) || null;
  const photoEl = document.getElementById('wo-photo');
  let photoUrl = null;

  if (photoEl?.files.length > 0) {
    const file = photoEl.files[0]; const suffix = isTwoADay ? '2' : '1';
    const ext = file.name.split('.').pop()||'jpg';
    const path = `${s.user_id}/${currentDay}-${suffix}.${ext}`;
    const up = await fetch(`${SB_URL}/storage/v1/object/workout-photos/${path}`, {
      method:'POST', headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true'}, body:file
    });
    if (up.ok) photoUrl = `${SB_URL}/storage/v1/object/public/workout-photos/${path}`;
  }

  await sb('workouts', { method:'POST', body: JSON.stringify({
    user_id: s.user_id, workout_date: currentDay, description: desc, photo_url: photoUrl,
    is_two_a_day: isTwoADay, duration_minutes: dur, calories_burned: cal
  })});

  if (isTwoADay) {
    const mySkips = allSkips.filter(sk => sk.user_id===s.user_id && !sk.erased);
    const paid = mySkips.filter(sk=>!sk.is_free).sort((a,b)=>b.skip_date.localeCompare(a.skip_date));
    const free = mySkips.filter(sk=>sk.is_free).sort((a,b)=>b.skip_date.localeCompare(a.skip_date));
    const toErase = paid[0]||free[0];
    if (toErase) await sb(`skips?id=eq.${toErase.id}`,{method:'PATCH',body:JSON.stringify({erased:true})});
    else alert('No skip to erase \u2014 bonus workout!');
  }
  await refreshAll();
}

async function submitSkip() {
  const s = getSession(); if (!s) return;
  const mySkips = allSkips.filter(sk => sk.user_id===s.user_id && !sk.erased);
  const freeUsed = mySkips.filter(sk=>sk.is_free).length;
  const isFree = freeUsed < 4;
  if (!isFree && !confirm("You've used all 4 free skips. This will cost $20. Confirm?")) return;
  await sb('skips',{method:'POST',body:JSON.stringify({user_id:s.user_id,skip_date:currentDay,is_free:isFree})});
  await refreshAll();
}

async function saveEdit(wid) {
  const w = allWorkouts.find(x=>x.id===wid); if(!w) return;
  const s = getSession();
  const desc = document.getElementById(`ed-desc-${wid}`).value.trim();
  const dur = parseInt(document.getElementById(`ed-dur-${wid}`).value)||null;
  const cal = parseInt(document.getElementById(`ed-cal-${wid}`).value)||null;
  const photoEl = document.getElementById(`ed-photo-${wid}`);
  let updates = { description: desc||null, duration_minutes: dur, calories_burned: cal };
  if (photoEl?.files.length>0) {
    const file = photoEl.files[0]; const suffix = w.is_two_a_day?'2':'1';
    const ext = file.name.split('.').pop()||'jpg';
    const path = `${s.user_id}/${w.workout_date}-${suffix}.${ext}`;
    const up = await fetch(`${SB_URL}/storage/v1/object/workout-photos/${path}`, {
      method:'POST',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true'},body:file
    });
    if (up.ok) updates.photo_url = `${SB_URL}/storage/v1/object/public/workout-photos/${path}`;
  }
  await sb(`workouts?id=eq.${wid}`,{method:'PATCH',body:JSON.stringify(updates)});
  await refreshAll();
}

async function deleteWorkout(wid) {
  if (!confirm('Are you sure you want to remove this entry?')) return;
  const s = getSession(); const w = allWorkouts.find(x=>x.id===wid);
  if (!w||w.user_id!==s.user_id) return;
  if (w.is_two_a_day) {
    const erased = allSkips.filter(sk=>sk.user_id===s.user_id&&sk.erased).sort((a,b)=>b.skip_date.localeCompare(a.skip_date));
    if (erased.length) await sb(`skips?id=eq.${erased[0].id}`,{method:'PATCH',body:JSON.stringify({erased:false})});
  }
  await sb(`workouts?id=eq.${wid}`,{method:'DELETE'});
  await recalcSkips(s.user_id);
  await refreshAll();
}

async function deleteSkip(sid) {
  if (!confirm('Are you sure you want to remove this skip?')) return;
  const s = getSession(); const sk = allSkips.find(x=>x.id===sid);
  if (!sk||sk.user_id!==s.user_id) return;
  await sb(`skips?id=eq.${sid}`,{method:'DELETE'});
  await recalcSkips(s.user_id);
  await refreshAll();
}

async function recalcSkips(userId) {
  const skips = await sb(`skips?user_id=eq.${userId}&order=skip_date.asc&select=id,is_free,erased`);
  if (!skips) return;
  const active = skips.filter(s=>!s.erased);
  for (let i=0;i<active.length;i++) {
    const shouldFree = i<4;
    if (active[i].is_free!==shouldFree) await sb(`skips?id=eq.${active[i].id}`,{method:'PATCH',body:JSON.stringify({is_free:shouldFree})});
  }
}

// ── Comments & Reactions ──
async function postWorkoutComment(wid) {
  const s = getSession(); if (!s) return;
  const input = document.getElementById(`cmt-${wid}`);
  const text = input?.value.trim(); if (!text) return;
  await sb('chat_messages',{method:'POST',body:JSON.stringify({user_id:s.user_id,text,source_type:'workout_comment',source_workout_id:wid})});
  await refreshAll();
}

let openPickerId = null;
function showEmojiPicker(evt, msgId) {
  evt.stopPropagation();
  document.querySelectorAll('.emoji-picker').forEach(p=>p.remove());
  if (openPickerId === msgId) { openPickerId = null; return; }
  openPickerId = msgId;
  const picker = document.createElement('div');
  picker.className = 'emoji-picker';
  REACTION_EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.textContent = em;
    btn.onclick = (e) => { e.stopPropagation(); toggleReaction(msgId, em); picker.remove(); openPickerId=null; };
    picker.appendChild(btn);
  });
  evt.target.parentElement.appendChild(picker);
  const close = () => { picker.remove(); openPickerId=null; document.removeEventListener('click',close); };
  setTimeout(()=>document.addEventListener('click',close),0);
}

async function toggleReaction(msgId, emoji) {
  const s = getSession(); if (!s) return;
  const existing = allReactions.find(r => r.message_id===msgId && r.user_id===s.user_id && r.emoji===emoji);
  if (existing) {
    await sb(`chat_reactions?id=eq.${existing.id}`,{method:'DELETE'});
  } else {
    await sb('chat_reactions',{method:'POST',body:JSON.stringify({message_id:msgId,user_id:s.user_id,emoji})});
  }
  await refreshAll();
}

// ── Calendar Tab ──
let calFilter = 'all';
function renderCalendar() {
  const el = document.getElementById('tab-calendar');
  const today = todayStr();
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const startDow = 2; // April 2026 starts Wednesday

  let html = `<div class="tab-panel">`;
  html += `<div class="cal-controls">
    <h2 style="font-size:1rem;color:var(--text2)">April 2026</h2>
    <select onchange="calFilter=this.value;renderCalendar()">
      <option value="all" ${calFilter==='all'?'selected':''}>All Participants</option>`;
  allUsers.forEach(u => {
    html += `<option value="${u.id}" ${calFilter===u.id?'selected':''}>${esc(u.display_name)}</option>`;
  });
  html += `</select></div>`;

  html += `<div class="cal-grid">`;
  days.forEach(d => html += `<div class="cal-header">${d}</div>`);
  for (let i=0;i<startDow;i++) html += '<div class="cal-empty"></div>';

  for (let day=1;day<=30;day++) {
    const ds = `2026-04-${String(day).padStart(2,'0')}`;
    const isToday = ds===today; const isFuture = ds>today;
    const cls = ['cal-day']; if(isToday) cls.push('today'); if(isFuture) cls.push('future');

    let indicators = '';
    if (calFilter === 'all') {
      allUsers.forEach(u => {
        const hw = allWorkouts.some(w=>w.user_id===u.id&&w.workout_date===ds);
        const hs = allSkips.some(s=>s.user_id===u.id&&s.skip_date===ds&&!s.erased);
        if (hw) indicators += `<div class="dot" style="background:${userColor(u.id)}"></div>`;
        else if (hs) indicators += `<div class="dot" style="background:${userColor(u.id)};opacity:0.3"></div>`;
      });
    } else {
      const uid = calFilter;
      const ws = allWorkouts.filter(w=>w.user_id===uid&&w.workout_date===ds);
      const sk = allSkips.find(s=>s.user_id===uid&&s.skip_date===ds&&!s.erased);
      const has2x = ws.some(w=>w.is_two_a_day);
      if (ws.length>0) indicators = has2x ? '<span class="day-icon">&#9989;&#9989;</span>' : '<span class="day-icon">&#9989;</span>';
      else if (sk) indicators = sk.is_free ? '<span class="day-icon">&#9197;&#65039;</span>' : '<span class="day-icon">&#10060;</span>';
    }

    const click = isFuture ? '' : `onclick="goToDay('${ds}')"`;
    html += `<div class="${cls.join(' ')}" ${click}><div class="day-num">${day}</div><div class="day-indicators">${indicators}</div></div>`;
  }
  html += '</div>';

  // Legend (only in "all" mode)
  if (calFilter === 'all') {
    html += '<div class="cal-legend">';
    allUsers.forEach(u => {
      html += `<div class="cal-legend-item">${avatarH(u,16)} ${esc(u.display_name)}</div>`;
    });
    html += '</div>';
  }

  html += '</div>';
  el.innerHTML = html;
}

// ── Scoreboard Tab ──
function renderScoreboard() {
  const el = document.getElementById('tab-scoreboard');
  const today = todayStr();

  const stats = allUsers.map(u => {
    const ws = allWorkouts.filter(w=>w.user_id===u.id);
    const tad = ws.filter(w=>w.is_two_a_day).length;
    const sks = allSkips.filter(s=>s.user_id===u.id);
    const freeUsed = sks.filter(s=>s.is_free&&!s.erased).length;
    const paid = sks.filter(s=>!s.is_free&&!s.erased).length;
    const erased = sks.filter(s=>s.erased).length;
    const owed = paid * 20;
    // Streak calculation
    let streak = 0;
    let checkDate = new Date(today + 'T00:00:00');
    // If no workout today, start from yesterday
    if (!ws.some(w=>w.workout_date===today)) checkDate.setDate(checkDate.getDate()-1);
    while (checkDate >= new Date('2026-04-01T00:00:00')) {
      const ds = fmtDate(checkDate);
      if (ws.some(w=>w.workout_date===ds)) { streak++; checkDate.setDate(checkDate.getDate()-1); }
      else break;
    }
    return {...u, wCount:ws.length, tad, freeUsed, paid, erased, owed, streak};
  }).sort((a,b)=>b.wCount-a.wCount);

  let html = `<div class="tab-panel"><h2 style="font-size:1rem;color:var(--text2);margin-bottom:12px">Scoreboard</h2>`;
  stats.forEach((s,i) => {
    const leader = i===0 && s.wCount>0;
    html += `<div class="sb-card${leader?' leader':''}">
      <div class="sb-rank">${leader?'\ud83c\udfc6':i+1}</div>
      <div class="sb-info">
        <div class="sb-name-row">${avatarH(s,40)}<div class="sb-name" style="color:${userColor(s.id)}">${esc(s.display_name)}</div></div>
        <div class="sb-stats">
          <span class="sb-stat">${s.wCount} workout${s.wCount!==1?'s':''}</span>
          <span class="sb-stat">${s.tad} 2x</span>
          <span class="sb-stat streak">${s.streak} day streak</span>
          <span class="sb-stat">${4-s.freeUsed}/4 free skips left</span>
          ${s.paid>0?`<span class="sb-stat owed">${s.paid} paid ($${s.owed})</span>`:''}
          ${s.erased>0?`<span class="sb-stat">${s.erased} erased</span>`:''}
          ${s.owed>0?`<span class="sb-stat owed">Owes $${s.owed}</span>`:''}
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// ── Chat Tab ──
function renderChat() {
  const s = getSession(); if (!s) return;
  const el = document.getElementById('tab-chat');

  let html = `<div class="chat-container">
    <div class="chat-messages" id="chat-msg-list">`;

  allMessages.forEach(m => {
    const u = allUsers.find(x=>x.id===m.user_id);
    html += `<div class="chat-msg">
      <div class="chat-msg-header">${avatarH(u,32)}<span class="chat-msg-name" style="color:${userColor(m.user_id)}">${u?esc(u.display_name):'?'}</span><span class="chat-msg-time">${relTime(m.created_at)}</span></div>
      <div class="chat-msg-text">${esc(m.text)}</div>`;
    if (m.source_type==='workout_comment'&&m.source_workout_id) {
      const w = allWorkouts.find(x=>x.id===m.source_workout_id);
      if (w) {
        const wu = allUsers.find(x=>x.id===w.user_id);
        html += `<div class="chat-msg-source" onclick="goToDay('${w.workout_date}')">&#128172; on ${wu?esc(wu.display_name):'?'}'s workout &mdash; ${w.workout_date}</div>`;
      }
    }
    html += renderReactions(m.id);
    html += `</div>`;
  });

  html += `</div>
    <div class="chat-input">
      <input type="text" id="chat-text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn btn-accent" onclick="sendChat()">Send</button>
    </div>
  </div>`;
  el.innerHTML = html;

  requestAnimationFrame(() => {
    const msgs = document.getElementById('chat-msg-list');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  });
}

async function sendChat() {
  const s = getSession(); if (!s) return;
  const input = document.getElementById('chat-text');
  const text = input?.value.trim(); if (!text) return;
  input.value = '';
  await sb('chat_messages',{method:'POST',body:JSON.stringify({user_id:s.user_id,text,source_type:'chat'})});
  await refreshAll();
}

// ── Lightbox ──
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}

// ── Refresh ──
async function refreshAll() {
  await loadAllData();
  updatePot();
  renderTopbar();
  renderActiveTab();
}

// ── Init ──
async function init() {
  await loadAllData();
  updatePot();
  renderTopbar();
  const s = getSession();
  if (s) {
    document.getElementById('auth-area').innerHTML = '';
    document.getElementById('tab-bar').style.display = 'flex';
    // Check hash
    const hash = location.hash.replace('#','');
    if (['daily','calendar','scoreboard','chat'].includes(hash)) activeTab = hash;
    document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id===`tab-${activeTab}`));
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.toggle('active', b.dataset.tab===activeTab));
    renderActiveTab();
  } else {
    document.getElementById('tab-bar').style.display = 'none';
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    renderAuth();
  }
}

// Hash change listener
window.addEventListener('hashchange', () => {
  const hash = location.hash.replace('#','');
  if (['daily','calendar','scoreboard','chat'].includes(hash) && hash !== activeTab) switchTab(hash);
});

init();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>April Squad 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a2e;--surface:#252540;--surface2:#2a2a3e;--border:#3a3a4e;--text:#f0f0f0;--text2:#a0a0b8;--accent:#4ade80;--accent2:#f59e0b;--danger:#ef4444;--pot:#f59e0b;--chat-bg:#20203a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.app-title{font-size:22px;font-weight:900;background:linear-gradient(135deg,#c0c0c0,#e8e8e8,#f59e0b,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;text-transform:capitalize}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-user{display:flex;align-items:center;gap:6px;cursor:pointer;position:relative}
.topbar-user span{color:var(--accent);font-weight:600;font-size:.85rem}
.profile-menu{display:none;position:absolute;top:42px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:250;box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:160px}
.profile-menu.open{display:block}
.profile-menu button{width:100%;padding:12px 16px;border:none;background:none;color:var(--text);font-size:.85rem;text-align:left;cursor:pointer;min-height:44px;display:flex;align-items:center;gap:8px}
.profile-menu button:hover{background:var(--surface2)}
.profile-menu button.danger{color:var(--danger)}

/* Buttons */
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;transition:all .15s;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{opacity:.88}
.btn:active{transform:scale(.97)}
.btn-accent{background:var(--accent);color:#000}
.btn-orange{background:var(--accent2);color:#000}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 12px;font-size:.8rem;min-height:36px}
.btn-icon{background:none;border:none;color:var(--text2);font-size:1rem;padding:4px 6px;min-height:44px;min-width:44px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px}
.btn-icon:hover{background:var(--surface2);color:var(--text)}

/* Activity bell */
.activity-btn{position:relative;background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer}
.activity-btn:hover{border-color:var(--accent);color:var(--accent)}
.activity-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--danger);display:none}
.activity-dot.show{display:block}
.activity-panel{display:none;position:fixed;top:54px;right:8px;width:360px;max-width:calc(100vw - 16px);max-height:calc(100vh - 70px);max-height:calc(100dvh - 70px);overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:250;padding:8px 0}
.activity-panel.open{display:block}
.activity-item{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;cursor:pointer;transition:background .1s}
.activity-item:hover{background:var(--surface2)}
.activity-text{font-size:.82rem;line-height:1.3;flex:1}
.activity-time{font-size:.7rem;color:var(--text2);white-space:nowrap}

/* Avatar */
.avatar{border-radius:50%;object-fit:cover;flex-shrink:0}
.avatar-placeholder{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#000;flex-shrink:0}

/* Pot banner */
.pot-banner{text-align:center;padding:14px 16px 10px;background:linear-gradient(135deg,var(--surface),var(--surface2));border-bottom:1px solid var(--border)}
.pot-amount{font-size:2.2rem;font-weight:800;color:var(--pot)}
.pot-sub{color:var(--text2);font-size:.85rem;margin-top:2px}
.pot-actions{margin-top:8px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.motivation-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:8px 18px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;min-height:40px;transition:all .15s}
.motivation-btn:hover{border-color:var(--accent);color:var(--accent)}
.global-log-btn{background:var(--accent);color:#000;border:none;padding:8px 18px;border-radius:20px;font-size:.82rem;font-weight:700;cursor:pointer;min-height:40px;transition:all .15s}
.global-log-btn:hover{opacity:.88}

/* Tab bar */
.tab-bar{display:flex;background:var(--surface);border-bottom:3px solid var(--border);position:sticky;top:0;z-index:100}
.tab-bar button{flex:1;padding:12px 4px;border:none;background:none;color:var(--text2);font-size:14px;font-weight:600;min-height:52px;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab-bar button .tab-icon{font-size:24px;line-height:1}
.tab-bar button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-bar button:hover:not(.active){color:var(--text)}

/* Toast */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--accent);border-radius:12px;padding:14px 20px;max-width:340px;width:calc(100% - 32px);z-index:500;text-align:center;font-size:.9rem;color:var(--text);cursor:pointer;animation:toastIn .3s ease,toastOut .3s ease 4s forwards;box-shadow:0 8px 32px rgba(0,0,0,.4)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;pointer-events:none}}

/* Auth */
.auth-container{max-width:340px;margin:60px auto;padding:24px;background:var(--surface);border-radius:12px;border:1px solid var(--border)}
.auth-toggle{display:flex;gap:0;margin-bottom:16px}
.auth-toggle button{flex:1;padding:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:.85rem;font-weight:600;min-height:44px}
.auth-toggle button:first-child{border-radius:8px 0 0 8px}
.auth-toggle button:last-child{border-radius:0 8px 8px 0}
.auth-toggle button.active{background:var(--accent);color:#000;border-color:var(--accent)}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:4px}
.form-group .label-hint{font-size:.7rem;color:var(--accent2);margin-left:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;min-height:44px}
.form-group textarea{resize:vertical;min-height:60px}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.form-group select option{background:var(--surface2);color:var(--text)}
.auth-error{color:var(--danger);font-size:.8rem;margin-bottom:8px}
.auth-footer{margin-top:14px;text-align:center}
.auth-footer a{color:var(--accent);font-size:.8rem;cursor:pointer;text-decoration:none}
.auth-footer a:hover{text-decoration:underline}
.recovery-msg{margin-top:10px;padding:12px;background:var(--surface2);border-radius:8px;font-size:.8rem;color:var(--text2);line-height:1.4}

/* Tab content */
.tab-content{display:none}.tab-content.active{display:block}
.tab-panel{max-width:600px;margin:0 auto;padding:16px}

/* Daily tracker */
.daily-header{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.daily-header h2{font-size:1rem;font-weight:600;text-align:center;min-width:200px}
.daily-nav{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1.1rem;cursor:pointer}
.daily-nav:hover{border-color:var(--accent);color:var(--accent)}
.daily-nav:disabled{opacity:.3;cursor:default}

/* Collapsible */
.collapsible{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapsible.open{max-height:700px}

/* Workout card */
.workout-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.wc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wc-user{display:flex;align-items:center;gap:8px}
.wc-user-name{font-weight:600;font-size:.9rem}
.wc-username-dim{font-size:.75rem;color:var(--text2);margin-left:2px}
.badge{padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:700}
.badge-type{background:var(--surface2);color:var(--text);font-size:.8rem;font-weight:700;padding:3px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}
.badge-2x{background:var(--accent2);color:#000}
.badge-duration{background:var(--surface2);color:var(--text2)}
.badge-cal{background:var(--surface2);color:var(--text2)}
.badge-comment{background:var(--surface2);color:var(--text2);cursor:pointer}
.badge-comment:hover{color:var(--accent)}
.wc-desc{font-size:.85rem;color:var(--text2);margin-bottom:8px;line-height:1.4}
.wc-photo{width:100%;border-radius:8px;cursor:pointer;max-height:220px;object-fit:cover;margin-bottom:8px}
.wc-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}

/* Skip card */
.skip-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.skip-badge{padding:3px 10px;border-radius:4px;font-size:.75rem;font-weight:700}
.skip-badge-paid{background:var(--danger);color:#fff}
.skip-badge-free{background:var(--accent2);color:#000}
.skip-badge-erased{background:var(--surface2);color:var(--text2);text-decoration:line-through}

/* Comments */
.comments-area{border-top:1px solid var(--border);margin-top:8px;padding-top:8px}
.comment-item{display:flex;gap:6px;margin-bottom:6px;align-items:flex-start}
.comment-body{font-size:.82rem;line-height:1.3}
.comment-body strong{color:var(--accent)}
.comment-time{font-size:.7rem;color:var(--text2)}
.comment-form{display:flex;gap:6px;margin-top:6px}
.comment-form input{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;min-height:44px}

/* Reactions */
.reactions-bar{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;position:relative}
.reaction-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:.75rem;background:var(--surface2);border:1px solid var(--border);cursor:pointer;min-height:28px;transition:all .15s}
.reaction-chip.mine{border-color:var(--accent);background:rgba(74,222,128,.1)}
.reaction-chip:hover{border-color:var(--accent)}
.reaction-add{font-size:.8rem;color:var(--text2);cursor:pointer;padding:2px 6px;min-height:28px;display:inline-flex;align-items:center;border-radius:12px}
.reaction-add:hover{background:var(--surface2)}
.emoji-picker{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;position:absolute;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.emoji-picker button{background:none;border:none;font-size:1.2rem;padding:4px;min-width:36px;min-height:36px;border-radius:6px;cursor:pointer}
.emoji-picker button:hover{background:var(--surface2)}

/* Chat msg menu */
.msg-menu-wrap{position:relative}
.msg-menu-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px;min-width:28px;min-height:28px;display:flex;align-items:center;justify-content:center}
.msg-menu-btn:hover{background:var(--surface2);color:var(--text)}
.msg-menu{display:none;position:absolute;right:0;top:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.3);min-width:100px}
.msg-menu.open{display:block}
.msg-menu button{width:100%;padding:10px 14px;border:none;background:none;color:var(--text);font-size:.85rem;text-align:left;cursor:pointer;min-height:40px}
.msg-menu button:hover{background:var(--surface2)}
.msg-menu button.danger{color:var(--danger)}

/* Edit inline */
.edit-form{margin-top:8px}
.edit-form .form-group{margin-bottom:8px}

/* Log form */
.log-form{background:var(--surface2);border-radius:10px;padding:14px;margin-top:8px}
.log-form h4{font-size:.9rem;margin-bottom:10px;color:var(--accent)}
.log-form .btn{width:100%;margin-top:8px}

/* Missing */
.missing-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:14px}
.missing-section h4{font-size:.8rem;color:var(--text2);margin-bottom:8px}
.missing-user{display:inline-flex;align-items:center;gap:4px;margin:3px 6px 3px 0;font-size:.82rem;color:var(--text2)}
.waiting{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Calendar */
.cal-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-controls select{padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;min-height:44px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-header{text-align:center;font-size:.72rem;color:var(--text2);padding:6px 2px;font-weight:600}
.cal-empty{background:transparent}
.cal-day{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 4px;text-align:center;cursor:pointer;min-height:60px;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.cal-day:hover{border-color:var(--accent);background:var(--surface2)}
.cal-day.today{border-color:var(--accent);border-width:2px}
.cal-day.future{opacity:.3;cursor:default}
.cal-day.future:hover{border-color:var(--border);background:var(--surface)}
.cal-day .day-num{font-size:.88rem;font-weight:700;color:var(--text)}
.cal-day .day-indicators{display:flex;flex-wrap:wrap;justify-content:center;gap:2px}
.cal-day .dot{width:6px;height:6px;border-radius:50%}
.cal-day .dot-skip{width:8px;height:8px;position:relative;display:inline-block}
.cal-day .dot-skip::before,.cal-day .dot-skip::after{content:'';position:absolute;top:50%;left:50%;width:8px;height:1.5px;background:currentColor;opacity:.5}
.cal-day .dot-skip::before{transform:translate(-50%,-50%) rotate(45deg)}
.cal-day .dot-skip::after{transform:translate(-50%,-50%) rotate(-45deg)}
.cal-day .day-icon{font-size:.75rem}
.cal-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.cal-legend-item{display:flex;align-items:center;gap:4px;font-size:.8rem;color:var(--text2)}

/* Scoreboard */
.sb-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.sb-card:nth-child(even){background:var(--surface2)}
.sb-card.leader{border-color:var(--pot);background:linear-gradient(135deg,rgba(245,158,11,.08),transparent)}
.sb-rank{font-size:1.3rem;font-weight:800;color:var(--text2);min-width:32px;text-align:center}
.sb-card.leader .sb-rank{color:var(--pot)}
.sb-info{flex:1;min-width:0}
.sb-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sb-name{font-weight:700;font-size:.95rem}
.sb-stats{display:flex;flex-wrap:wrap;gap:6px;font-size:.73rem;color:var(--text2)}
.sb-stat{background:var(--bg);padding:3px 8px;border-radius:4px;white-space:nowrap}
.sb-stat.owed{color:var(--danger);font-weight:600}
.sb-stat.streak{color:var(--accent)}
.team-stats{margin-top:20px}
.team-stats h3{font-size:1rem;margin-bottom:12px;color:var(--text2)}
.ts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ts-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.ts-card.full{grid-column:1/-1}
.ts-value{font-size:1.6rem;font-weight:800;color:var(--accent)}
.ts-label{font-size:.78rem;color:var(--text2);margin-top:2px}
.type-rank{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.85rem}
.type-rank .type-count{color:var(--text2);font-size:.78rem}

/* Chat */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 220px);height:calc(100dvh - 220px);max-width:600px;margin:0 auto}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.chat-msg{background:var(--surface);border-radius:10px;padding:10px 14px;position:relative}
.chat-msg-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.chat-msg-name{font-weight:600;font-size:.85rem}
.chat-msg-time{font-size:.7rem;color:var(--text2)}
.chat-msg-text{font-size:.88rem;line-height:1.4}
.chat-msg-source{font-size:.75rem;color:var(--accent2);margin-top:4px;cursor:pointer}
.chat-msg-source:hover{text-decoration:underline}
.chat-input{display:flex;gap:8px;padding:12px 16px;background:var(--surface);border-top:1px solid var(--border)}
.chat-input input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;min-height:44px}

/* Modal overlay for global log */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;overflow-y:auto;padding:20px;justify-content:center;align-items:flex-start}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:12px;border:1px solid var(--border);width:100%;max-width:440px;margin-top:40px;overflow:hidden;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:1rem}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;justify-content:center;align-items:center;cursor:pointer;animation:fadeIn .2s ease}
.lightbox.open{display:flex}
.lightbox img{max-width:95%;max-height:90vh;border-radius:8px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Admin tool */
.admin-section{max-width:400px;margin:30px auto;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.admin-section h3{font-size:.9rem;margin-bottom:10px;color:var(--text2)}
.admin-user{padding:6px 0;font-size:.85rem;border-bottom:1px solid var(--border)}

/* Responsive */
@media(max-width:420px){
  .pot-amount{font-size:1.8rem}
  .tab-bar button{font-size:12px}
  .tab-bar button .tab-icon{font-size:20px}
  .cal-day{min-height:48px;padding:4px 2px}
  .cal-day .day-num{font-size:.78rem}
  .daily-header h2{font-size:.88rem;min-width:170px}
  .app-title{font-size:18px}
  .ts-grid{grid-template-columns:1fr}
  .activity-panel{right:4px}
}
@media(max-width:375px){.cal-grid{gap:2px}.cal-day{min-height:44px}.cal-day .dot{width:5px;height:5px}}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <span class="app-title">April Squad 2026 &#128293;</span>
  <div class="topbar-right" id="topbar-right"></div>
</div>

<!-- Pot Banner -->
<div class="pot-banner" id="pot-banner">
  <div class="pot-amount" id="pot-amount">The Pot: $0</div>
  <div class="pot-sub" id="pot-sub">0 paid skips so far</div>
  <div class="pot-actions">
    <button class="global-log-btn" id="global-log-btn" style="display:none" onclick="openGlobalLog()">Log Workout</button>
    <button class="motivation-btn" onclick="showMotivation()">I Need Motivation</button>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar" id="tab-bar" style="display:none">
  <button data-tab="daily" class="active" onclick="switchTab('daily')"><span class="tab-icon">&#128197;</span>Daily Tracker</button>
  <button data-tab="calendar" onclick="switchTab('calendar')"><span class="tab-icon">&#128467;</span>Calendar</button>
  <button data-tab="scoreboard" onclick="switchTab('scoreboard')"><span class="tab-icon">&#127942;</span>Scoreboard</button>
  <button data-tab="chat" onclick="switchTab('chat')"><span class="tab-icon">&#128172;</span>Chat</button>
</div>

<div id="tab-daily" class="tab-content active"></div>

async function doLogin(){const err=document.getElementById('auth-error'),u=document.getElementById('auth-user').value.trim().toLowerCase(),p=document.getElementById('auth-pin').value.trim();if(!u||p.length!==4){err.textContent='Enter username and 4-digit PIN';return}try{const rows=await sb(`users?username=eq.${encodeURIComponent(u)}&select=id,username,display_name,avatar_url,pin_hash`);if(!rows||!rows.length){err.textContent='User not found';return}const user=rows[0],h=await hashPin(p);if(h!==user.pin_hash){err.textContent='Wrong PIN';return}setS(user.id,user.username,user.display_name,user.avatar_url);await init()}catch(e){err.textContent=e.message}}
async function doSignup(){const err=document.getElementById('auth-error'),dn=document.getElementById('auth-display').value.trim(),u=document.getElementById('auth-user').value.trim().toLowerCase(),p=document.getElementById('auth-pin').value.trim(),avIn=document.getElementById('auth-avatar');if(!dn){err.textContent='Display Name is required';return}if(!u){err.textContent='Username is required';return}if(p.length!==4||!/^\d{4}$/.test(p)){err.textContent='PIN must be 4 digits';return}try{const h=await hashPin(p);const rows=await sb('users',{method:'POST',body:JSON.stringify({username:u,display_name:dn,pin_hash:h})});const user=rows[0];let avUrl=null;if(avIn.files.length>0){const file=avIn.files[0],ext=file.name.split('.').pop()||'jpg',path=`${user.id}/avatar.${ext}`;const up=await fetch(`${SB_URL}/storage/v1/object/avatars/${path}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true'},body:file});if(up.ok){avUrl=`${SB_URL}/storage/v1/object/public/avatars/${path}`;await sb(`users?id=eq.${user.id}`,{method:'PATCH',body:JSON.stringify({avatar_url:avUrl})})}}setS(user.id,user.username,user.display_name,avUrl);await init()}catch(e){if(e.message.includes('duplicate')||e.message.includes('unique'))err.textContent='Username already taken';else err.textContent=e.message}}

function openMyStats(){document.getElementById('profile-menu').classList.remove('open');const s=getS();if(!s)return;const today=todayStr();const u=allUsersRaw.find(x=>x.id===s.user_id)||s;const ws=allWorkouts.filter(w=>w.user_id===s.user_id);const sks=allSkips.filter(x=>x.user_id===s.user_id);const tad=ws.filter(w=>w.is_two_a_day).length;const totalCal=ws.reduce((a,w)=>a+(w.calories_burned||0),0);const totalMin=ws.reduce((a,w)=>a+(w.duration_minutes||0),0);const fU=sks.filter(x=>x.is_free&&!x.erased).length;const pd=sks.filter(x=>!x.is_free&&!x.erased).length;
  let streak=0;let cd=new Date(today+'T00:00:00');if(!ws.some(w=>w.workout_date===today))cd.setDate(cd.getDate()-1);while(cd>=new Date('2026-04-01T00:00:00')){if(ws.some(w=>w.workout_date===fmtD(cd))){streak++;cd.setDate(cd.getDate()-1)}else break}
  const tc={};ws.forEach(w=>{if(w.workout_type){tc[w.workout_type]=(tc[w.workout_type]||0)+1}});const tr=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  let h=`<div style="padding:20px"><h3 style="margin-bottom:14px">${avH(u,32)} ${esc(u.display_name)}'s Stats</h3><div class="ts-grid">
    <div class="ts-card"><div class="ts-value">${ws.length}</div><div class="ts-label">Workouts</div></div>

    <div class="ts-card"><div class="ts-value">${tad}</div><div class="ts-label">Two-a-Days</div></div>
    <div class="ts-card"><div class="ts-value">${4-fU}/4</div><div class="ts-label">Free Skips Left</div></div>
    <div class="ts-card"><div class="ts-value">${pd}</div><div class="ts-label">Paid Skips</div></div>
    <div class="ts-card"><div class="ts-value">$${pd*20}</div><div class="ts-label">Owed</div></div>`;
  if(tr.length){h+=`<div class="ts-card full"><div class="ts-label" style="margin-bottom:8px;font-size:.85rem;font-weight:600;color:var(--text)">My Workout Types</div>`;tr.forEach(([t,c])=>{h+=`<div class="type-rank"><span>${wtLabel(t)}</span><span class="type-count">${c}</span></div>`});h+=`</div>`}

function checkActivityDot(){const dot=document.getElementById('activity-dot');if(!dot)return;const lastOpen=parseInt(localStorage.getItem('as_activity_last')||'0');const items=buildActivityItems();if(items.length&&new Date(items[0].time).getTime()>lastOpen)dot.classList.add('show');else dot.classList.remove('show')}
function toggleActivity(e){e.stopPropagation();const panel=document.getElementById('activity-panel');if(panel.classList.contains('open')){panel.classList.remove('open');return}localStorage.setItem('as_activity_last',String(Date.now()));document.getElementById('activity-dot')?.classList.remove('show');const items=buildActivityItems().slice(0,20);let h='';if(!items.length)h='<div style="padding:14px;color:var(--text2);font-size:.85rem">No activity yet</div>';
items.forEach(it=>{h+=`<div class="activity-item" onclick="activityNav('${it.nav}','${it.date||''}')"><div>${avH(it.user,24)}</div><div class="activity-text">${it.text}</div><div class="activity-time">${relT(it.time)}</div></div>`});
panel.innerHTML=h;panel.classList.add('open');const close=()=>{panel.classList.remove('open');document.removeEventListener('click',close)};setTimeout(()=>document.addEventListener('click',close),0)}
function buildActivityItems(){const items=[];allWorkouts.forEach(w=>{const u=allUsers.find(x=>x.id===w.user_id);const wt=w.workout_type?wtLabel(w.workout_type):'workout';if(w.is_two_a_day)items.push({time:w.created_at,text:`@${u?u.username:'?'} logged a two-a-day!`,user:u,nav:'daily',date:w.workout_date});else items.push({time:w.created_at,text:`@${u?u.username:'?'} logged a ${wt}`,user:u,nav:'daily',date:w.workout_date})});
allSkips.forEach(sk=>{const u=allUsers.find(x=>x.id===sk.user_id);if(sk.is_free)items.push({time:sk.created_at,text:`@${u?u.username:'?'} used a free skip`,user:u,nav:'daily',date:sk.skip_date});else items.push({time:sk.created_at,text:`@${u?u.username:'?'} skipped a day ($20)`,user:u,nav:'daily',date:sk.skip_date})});
allMessages.filter(m=>m.source_type==='workout_comment').forEach(m=>{const u=allUsers.find(x=>x.id===m.user_id);const w=allWorkouts.find(x=>x.id===m.source_workout_id);const wu=w?allUsers.find(x=>x.id===w.user_id):null;items.push({time:m.created_at,text:`@${u?u.username:'?'} commented on @${wu?wu.username:'?'}'s workout`,user:u,nav:'daily',date:w?w.workout_date:''})});
allMessages.filter(m=>m.source_type==='chat').forEach(m=>{const u=allUsers.find(x=>x.id===m.user_id);items.push({time:m.created_at,text:`@${u?u.username:'?'} sent a message${m.photo_url?' with a photo':''}`,user:u,nav:'chat',date:''})});
allWReactions.forEach(r=>{const u=allUsers.find(x=>x.id===r.user_id);const w=allWorkouts.find(x=>x.id===r.workout_id);const wu=w?allUsers.find(x=>x.id===w.user_id):null;items.push({time:r.created_at,text:`@${u?u.username:'?'} reacted ${r.emoji} to @${wu?wu.username:'?'}'s workout`,user:u,nav:'daily',date:w?w.workout_date:''})});
allReactions.forEach(r=>{const u=allUsers.find(x=>x.id===r.user_id);items.push({time:r.created_at,text:`@${u?u.username:'?'} reacted ${r.emoji} to a message`,user:u,nav:'chat',date:''})});
allUsers.forEach(u=>{items.push({time:u.created_at,text:`@${u.username} joined the challenge!`,user:u,nav:'scoreboard',date:''})});
return items.sort((a,b)=>new Date(b.time)-new Date(a.time))}

  days.forEach(d=>h+=`<div class="cal-header">${d}</div>`);for(let i=0;i<2;i++)h+='<div class="cal-empty"></div>';
  for(let day=1;day<=30;day++){const ds=`2026-04-${String(day).padStart(2,'0')}`;const isT=ds===today,isF=ds>today;const cls=['cal-day'];if(isT)cls.push('today');if(isF)cls.push('future');
    let ind='';if(calFilter==='all'){allUsers.forEach(u=>{const hw=allWorkouts.some(w=>w.user_id===u.id&&w.workout_date===ds);const hs=allSkips.some(s=>s.user_id===u.id&&s.skip_date===ds&&!s.erased);if(hw)ind+=`<div class="dot" style="background:${uC(u.id)}"></div>`;else if(hs)ind+=`<div class="dot-skip" style="color:${uC(u.id)}"></div>`})}
    else{const uid=calFilter,ws=allWorkouts.filter(w=>w.user_id===uid&&w.workout_date===ds),sk=allSkips.find(s=>s.user_id===uid&&s.skip_date===ds&&!s.erased);const h2=ws.some(w=>w.is_two_a_day);if(ws.length)ind=h2?'<span class="day-icon">&#9989;&#9989;</span>':'<span class="day-icon">&#9989;</span>';else if(sk)ind=sk.is_free?'<span class="day-icon">&#9197;&#65039;</span>':'<span class="day-icon">&#10060;</span>'}
    const ck=isF?'':`onclick="goToDay('${ds}')"`;h+=`<div class="${cls.join(' ')}" ${ck}><div class="day-num">${day}</div><div class="day-indicators">${ind}</div></div>`}
  h+='</div>';if(calFilter==='all'){h+='<div class="cal-legend">';allUsers.forEach(u=>{const dw=allWorkouts.filter(w=>w.user_id===u.id&&w.workout_date===currentDay);const dsk=allSkips.find(s=>s.user_id===u.id&&s.skip_date===currentDay&&!s.erased);let status='';if(dw.length>1)status='Workout + 2x';else if(dw.length===1)status='Workout';else if(dsk)status=dsk.is_free?'Free skip':'Paid skip ($20)';else status='\u2014';h+=`<div class="cal-legend-item">${avH(u,16)} <span style="color:${uC(u.id)}">${esc(u.display_name)}</span> <span style="font-size:.7rem;color:var(--text2)">${status}</span></div>`});h+='</div>'}
  h+='</div>';el.innerHTML=h;
}

// Scoreboard
function renderScoreboard(){
  const el=document.getElementById('tab-scoreboard'),today=todayStr();
  const stats=allUsers.map(u=>{const ws=allWorkouts.filter(w=>w.user_id===u.id),tad=ws.filter(w=>w.is_two_a_day).length,sks=allSkips.filter(s=>s.user_id===u.id),fU=sks.filter(s=>s.is_free&&!s.erased).length,pd=sks.filter(s=>!s.is_free&&!s.erased).length,er=sks.filter(s=>s.erased).length;
    let streak=0;let cd=new Date(today+'T00:00:00');if(!ws.some(w=>w.workout_date===today))cd.setDate(cd.getDate()-1);while(cd>=new Date('2026-04-01T00:00:00')){if(ws.some(w=>w.workout_date===fmtD(cd))){streak++;cd.setDate(cd.getDate()-1)}else break}
    const totalCal=ws.reduce((a,w)=>a+(w.calories_burned||0),0);
    return{...u,wC:ws.length,tad,fU,pd,er,owed:pd*20,streak,totalCal}}).sort((a,b)=>{if(sbSort==='streak')return b.streak-a.streak||b.wC-a.wC;if(sbSort==='calories')return b.totalCal-a.totalCal||b.wC-a.wC;return b.wC-a.wC});
  let h=`<div class="tab-panel"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h2 style="font-size:1rem;color:var(--text2)">Leaderboard</h2><select style="padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.8rem;min-height:40px" onchange="sbSort=this.value;renderScoreboard()"><option value="workouts"${sbSort==='workouts'?' selected':''}>By Workouts</option><option value="streak"${sbSort==='streak'?' selected':''}>By Streak</option><option value="calories"${sbSort==='calories'?' selected':''}>By Calories</option></select></div>`;
  stats.forEach((s,i)=>{const ld=i===0&&s.wC>0;
    h+=`<div class="sb-card${ld?' leader':''}"><div class="sb-rank">${ld?'\ud83c\udfc6':i+1}</div><div class="sb-info"><div class="sb-name-row">${avH(s,40)}<div class="sb-name" style="color:${uC(s.id)}">${nameDaily(s)}</div></div><div class="sb-stats"><span class="sb-stat">${s.wC} workout${s.wC!==1?'s':''}</span><span class="sb-stat">${s.tad} 2x</span><span class="sb-stat streak">${s.streak} day streak</span>${s.totalCal?`<span class="sb-stat">\ud83d\udd25 ${s.totalCal} cal</span>`:''}<span class="sb-stat">${4-s.fU}/4 free skips</span>${s.pd?`<span class="sb-stat owed">${s.pd} paid</span>`:''}<span class="sb-stat owed">Owes $${s.owed}</span>${s.er?`<span class="sb-stat">${s.er} erased</span>`:''}</div></div></div>`});

  // Team Stats
  const totalW=allWorkouts.length;const totalCal=allWorkouts.reduce((a,w)=>a+(w.calories_burned||0),0);const totalMin=allWorkouts.reduce((a,w)=>a+(w.duration_minutes||0),0);
  const typeCounts={};allWorkouts.forEach(w=>{if(w.workout_type){typeCounts[w.workout_type]=(typeCounts[w.workout_type]||0)+1}});
  const typeRank=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]);
  let bestDay='',bestDayCount=0;const dayCounts={};allWorkouts.forEach(w=>{dayCounts[w.workout_date]=(dayCounts[w.workout_date]||0)+1});Object.entries(dayCounts).forEach(([d,c])=>{if(c>bestDayCount){bestDayCount=c;bestDay=d}});

  h+=`<div class="team-stats"><h3>Team Stats</h3><div class="ts-grid">
    <div class="ts-card"><div class="ts-value">${totalW}</div><div class="ts-label">Total Workouts</div></div>
    <div class="ts-card"><div class="ts-value">${totalMin||'\u2014'}</div><div class="ts-label">Total Minutes</div></div>
    <div class="ts-card"><div class="ts-value">${totalCal||'\u2014'}</div><div class="ts-label">Total Calories</div></div>
    <div class="ts-card"><div class="ts-value">${bestDay?shortDate(bestDay)+' ('+bestDayCount+')':'\u2014'}</div><div class="ts-label">Most Active Day</div></div>`;
  if(typeRank.length){h+=`<div class="ts-card full"><div class="ts-label" style="margin-bottom:8px;font-size:.85rem;font-weight:600;color:var(--text)">Top Workout Types</div>`;typeRank.forEach(([t,c])=>{h+=`<div class="type-rank"><span>${wtLabel(t)}</span><span class="type-count">${c} workout${c!==1?'s':''}</span></div>`});h+=`</div>`}
  h+=`</div></div></div>`;el.innerHTML=h;
}

// Chat
function renderChat(){
  const s=getS();if(!s)return;const el=document.getElementById('tab-chat');
  let h=`<div class="chat-container"><div class="chat-messages" id="chat-msg-list">`;
  allMessages.forEach(m=>{const u=allUsers.find(x=>x.id===m.user_id);const isO=s&&s.user_id===m.user_id;
    h+=`<div class="chat-msg"><div class="chat-msg-header">${avH(u,32)}<span class="chat-msg-name" style="color:${uC(m.user_id)}">${nameChat(u)}</span><span class="chat-msg-time">${relT(m.created_at)}</span>`;
    if(isO)h+=`<div class="msg-menu-wrap" style="margin-left:auto"><button class="msg-menu-btn" onclick="toggleMsgMenu(event,'${m.id}')">&#8230;</button><div class="msg-menu" id="mm-${m.id}"><button onclick="editMsg('${m.id}')">Edit</button><button class="danger" onclick="deleteMsg('${m.id}')">Delete</button></div></div>`;
    h+=`</div><div class="chat-msg-text" id="mt-${m.id}">${esc(m.text)}</div>${m.photo_url?`<img src="${m.photo_url}" style="max-width:100%;max-height:200px;border-radius:8px;margin-top:6px;cursor:pointer" onclick="openLightbox('${m.photo_url}')" alt="Photo">`:''}<div id="me-${m.id}"></div>`;
    if(m.source_type==='workout_comment'&&m.source_workout_id){const w=allWorkouts.find(x=>x.id===m.source_workout_id);if(w){const wu=allUsers.find(x=>x.id===w.user_id);const wt=w.workout_type?wtLabel(w.workout_type):'"'+(w.description||'workout')+'"';h+=`<div class="chat-msg-source" onclick="goToDay('${w.workout_date}')">&#128172; on @${wu?wu.username:'?'}'s ${wt} &mdash; ${shortDate(w.workout_date)}</div>`}}
    h+=renderReactions(m.id)+`</div>`});
  h+=`</div><div class="chat-input"><label class="btn btn-outline btn-sm" style="cursor:pointer;padding:0 10px" title="Attach photo"><input type="file" id="chat-photo" accept="image/*" style="display:none" onchange="chatPhotoSelected(this)">&#128247;</label><div style="position:relative"><button class="btn btn-outline btn-sm" style="padding:0 10px" onclick="showTextEP(event,'chat-text')" title="Add emoji">&#128578;</button></div><input type="text" id="chat-text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()"><button class="btn btn-accent" onclick="sendChat()">Send</button></div><div id="chat-photo-preview" style="display:none;padding:4px 16px;background:var(--surface);font-size:.8rem;color:var(--text2)"></div></div>`;
  el.innerHTML=h;requestAnimationFrame(()=>{const ml=document.getElementById('chat-msg-list');if(ml)ml.scrollTop=ml.scrollHeight})}
function toggleMsgMenu(e,mid){e.stopPropagation();const menu=document.getElementById(`mm-${mid}`);document.querySelectorAll('.msg-menu.open').forEach(m=>{if(m.id!==`mm-${mid}`)m.classList.remove('open')});menu.classList.toggle('open');const cl=()=>{menu.classList.remove('open');document.removeEventListener('click',cl)};if(menu.classList.contains('open'))setTimeout(()=>document.addEventListener('click',cl),0)}
function editMsg(mid){const m=allMessages.find(x=>x.id===mid);if(!m)return;const area=document.getElementById(`me-${mid}`);area.innerHTML=`<div style="display:flex;gap:6px;margin-top:6px"><input type="text" id="mei-${mid}" value="${esc(m.text)}" style="flex:1;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);min-height:40px"><button class="btn btn-accent btn-sm" onclick="saveMsgEdit('${mid}')">Save</button><button class="btn btn-outline btn-sm" onclick="cancelMsgEdit('${mid}')">Cancel</button></div>`}
function cancelMsgEdit(mid){document.getElementById(`me-${mid}`).innerHTML=''}
async function saveMsgEdit(mid){const text=document.getElementById(`mei-${mid}`)?.value.trim();if(!text)return;await sb(`chat_messages?id=eq.${mid}`,{method:'PATCH',body:JSON.stringify({text})});await refreshAll()}
async function deleteMsg(mid){if(!confirm('Delete this message?'))return;await sb(`chat_messages?id=eq.${mid}`,{method:'DELETE'});await refreshAll()}
let openTextEP=null;
function showTextEP(e,inputId){e.stopPropagation();document.querySelectorAll('.emoji-picker').forEach(p=>p.remove());if(openTextEP===inputId){openTextEP=null;return}openTextEP=inputId;const pk=document.createElement('div');pk.className='emoji-picker';pk.style.flexWrap='wrap';pk.style.maxWidth='220px';pk.style.bottom='100%';pk.style.top='auto';pk.style.left='0';TEXT_EMOJIS.forEach(em=>{const b=document.createElement('button');b.textContent=em;b.onclick=ev=>{ev.stopPropagation();const inp=document.getElementById(inputId);if(inp){const start=inp.selectionStart||inp.value.length;inp.value=inp.value.slice(0,start)+em+inp.value.slice(start);inp.focus();inp.selectionStart=inp.selectionEnd=start+em.length}};pk.appendChild(b)});e.target.parentElement.appendChild(pk);const cl=()=>{pk.remove();openTextEP=null;document.removeEventListener('click',cl)};setTimeout(()=>document.addEventListener('click',cl),0)}
function chatPhotoSelected(el){const prev=document.getElementById('chat-photo-preview');if(el.files.length){prev.textContent='Photo attached: '+el.files[0].name;prev.style.display='block'}else{prev.style.display='none'}}
async function sendChat(){const s=getS();if(!s)return;const input=document.getElementById('chat-text');const photoEl=document.getElementById('chat-photo');const text=input?.value.trim();if(!text&&!(photoEl?.files.length)){return}input.value='';let photoUrl=null;
  if(photoEl?.files.length>0){const file=photoEl.files[0],ext=file.name.split('.').pop()||'jpg',path=`${s.user_id}/chat-${Date.now()}.${ext}`;const up=await fetch(`${SB_URL}/storage/v1/object/workout-photos/${path}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true'},body:file});if(up.ok)photoUrl=`${SB_URL}/storage/v1/object/public/workout-photos/${path}`;photoEl.value='';document.getElementById('chat-photo-preview').style.display='none'}
  await sb('chat_messages',{method:'POST',body:JSON.stringify({user_id:s.user_id,text:text||'',source_type:'chat',photo_url:photoUrl})});await refreshAll()}

// Lightbox
function openLightbox(url){document.getElementById('lightbox-img').src=url;document.getElementById('lightbox').classList.add('open')}

// Refresh
async function refreshAll(){await loadAll();updatePot();renderTopbar();renderActiveTab()}

// Init
async function init(){
  await loadAll();updatePot();renderTopbar();const s=getS();
  if(s){document.getElementById('auth-area').innerHTML='';document.getElementById('admin-area').innerHTML='';document.getElementById('tab-bar').style.display='flex';document.getElementById('pot-banner').style.display='';
    const hash=location.hash.replace('#','');if(['daily','calendar','scoreboard','chat'].includes(hash))activeTab=hash;
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id===`tab-${activeTab}`));
    document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.toggle('active',b.dataset.tab===activeTab));
    renderActiveTab()}
  else{document.getElementById('tab-bar').style.display='none';document.getElementById('pot-banner').style.display='none';document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));renderAuth()}}
window.addEventListener('hashchange',()=>{const h=location.hash.replace('#','');if(['daily','calendar','scoreboard','chat'].includes(h)&&h!==activeTab)switchTab(h)});
init();
</script>
